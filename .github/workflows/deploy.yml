name: Deploy to Clever Cloud

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.CLEVER_SSH_KEY }}

      - name: Trust Clever Cloud host
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H push-n3-par-clevercloud-customers.services.clever-cloud.com >> ~/.ssh/known_hosts

      - name: Deploy to agel-outreach
        run: git push git+ssh://git@push-n3-par-clevercloud-customers.services.clever-cloud.com/app_6df310f8-774a-453c-ac0f-5b1c0c5de5de.git HEAD:main --force
