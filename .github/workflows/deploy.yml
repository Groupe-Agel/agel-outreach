name: Deploy to Clever Cloud

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: agel-outreach-clever-deploy
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.CLEVER_SSH_KEY }}

      - name: Trust Clever Cloud host
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H push-n1-rba-clevercloud-customers.services.clever-cloud.com >> ~/.ssh/known_hosts

      - name: Deploy to agel-outreach
        run: git push git+ssh://git@push-n1-rba-clevercloud-customers.services.clever-cloud.com/app_961cfc69-7a31-4421-a6e5-0cde2ad1334c.git HEAD:master --force
