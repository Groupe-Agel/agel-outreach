<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>API tokens — mockup</title>
    <style>
      :root {
        --bg: #0f1115;
        --panel: #161a22;
        --panel-2: #1d2230;
        --border: #2a3142;
        --text: #e6eaf2;
        --muted: #9aa3b2;
        --accent: #6c8cff;
        --ok: #4ade80;
        --row: #11151c;
      }
      * { box-sizing: border-box; }
      body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: var(--bg); color: var(--text); }
      .shell { display: grid; grid-template-columns: 220px 1fr; min-height: 100vh; }
      .nav { background: var(--panel); border-right: 1px solid var(--border); padding: 20px 16px; }
      .nav h1 { font-size: 14px; letter-spacing: .04em; color: var(--muted); margin: 0 0 16px; text-transform: uppercase; }
      .nav a { display: block; padding: 8px 10px; border-radius: 6px; color: var(--text); text-decoration: none; font-size: 14px; margin-bottom: 2px; }
      .nav a.active { background: var(--panel-2); color: var(--accent); }
      .main { padding: 24px 28px; }
      .row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
      h2 { margin: 0; font-size: 20px; }
      .btn { background: var(--accent); color: #fff; border: 0; border-radius: 6px; padding: 8px 14px; font-size: 14px; cursor: pointer; }
      .btn.ghost { background: transparent; color: var(--text); border: 1px solid var(--border); }
      .card { background: var(--panel); border: 1px solid var(--border); border-radius: 10px; padding: 18px; margin-bottom: 16px; }
      table { width: 100%; border-collapse: collapse; font-size: 14px; }
      th, td { text-align: left; padding: 10px 12px; border-bottom: 1px solid var(--border); }
      th { color: var(--muted); font-weight: 500; font-size: 12px; letter-spacing: .04em; text-transform: uppercase; }
      tr td { background: var(--row); }
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
      .pill { display: inline-block; padding: 3px 10px; border-radius: 999px; font-size: 12px; }
      .pill.ok { background: rgba(74,222,128,.12); color: var(--ok); }
      .reveal { background: var(--panel-2); border: 1px dashed var(--border); border-radius: 8px; padding: 14px; margin-bottom: 16px; }
      .reveal h3 { margin: 0 0 6px; font-size: 14px; color: var(--accent); }
      .reveal .val { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 13px; background: #0a0d12; padding: 8px 10px; border-radius: 6px; display: inline-block; }
    </style>
  </head>
  <body>
    <div class="shell">
      <aside class="nav">
        <h1>agel-outreach</h1>
        <a href="#">Campaigns</a>
        <a href="#">Templates</a>
        <a href="#" class="active">Settings</a>
      </aside>
      <main class="main">
        <div class="row">
          <h2>API tokens</h2>
          <button class="btn">Create token</button>
        </div>

        <div class="reveal">
          <h3>New token — copy now, it will not be shown again</h3>
          <span class="val">agel_5fK7xJ2pQv9TwYc3LbRn8M1aZeHsUd4o</span>
          <button class="btn ghost" style="margin-left:8px;">Copy</button>
        </div>

        <div class="card">
          <table>
            <thead>
              <tr>
                <th>Name</th>
                <th>Last 4</th>
                <th>Created</th>
                <th>Last used</th>
                <th>Status</th>
                <th></th>
              </tr>
            </thead>
            <tbody>
              <tr>
                <td>ci-bot</td>
                <td class="mono">…4o</td>
                <td>just now</td>
                <td>—</td>
                <td><span class="pill ok">Active</span></td>
                <td><button class="btn ghost">Revoke</button></td>
              </tr>
              <tr>
                <td>partnerships-script</td>
                <td class="mono">…9q</td>
                <td>2026-04-12</td>
                <td>3 hours ago</td>
                <td><span class="pill ok">Active</span></td>
                <td><button class="btn ghost">Revoke</button></td>
              </tr>
            </tbody>
          </table>
        </div>
      </main>
    </div>
  </body>
</html>
